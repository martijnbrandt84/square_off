<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Off</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="game-page">
  <div class="game-layout">

    <!-- Left panel — speler 1 -->
    <aside class="side-panel left-panel">
      <div class="player-card" id="p1card">
        <div class="pirate-icon">🤵</div>
        <div class="player-info">
          <div class="player-name" id="p1name">---</div>
          <div class="player-locs" id="p1locs">◌ ◌ ◌ ◌ ◌</div>
        </div>
        <div class="turn-indicator" id="p1turn"></div>
      </div>

      <div class="power-display" id="powerDisplay" style="display:none">
        <div class="power-title">⚡ Actief</div>
        <div class="power-text" id="powerText"></div>
      </div>
    </aside>

    <!-- Main board -->
    <main class="board-area">
      <div class="game-header">
        <button class="btn-back" onclick="window.location='/'">← Lobby</button>
        <div class="room-info">
          <span class="room-label">Kamer</span>
          <span class="room-code" id="roomCode"></span>
          <button class="btn-copy" id="copyLink" title="Kopieer link">🔗 Kopieer</button>
        </div>
        <div class="status-badge" id="statusBadge">Wachten...</div>
      </div>

      <div class="board-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>

      <div class="action-hint" id="actionHint"></div>
    </main>

    <!-- Right panel — speler 2 -->
    <aside class="side-panel right-panel">
      <div class="player-card" id="p2card">
        <div class="pirate-icon">🕴️</div>
        <div class="player-info">
          <div class="player-name" id="p2name">Wachten...</div>
          <div class="player-locs" id="p2locs">◌ ◌ ◌ ◌ ◌</div>
        </div>
        <div class="turn-indicator" id="p2turn"></div>
      </div>

      <div class="log-panel">
        <div class="log-title">— Bewegingen —</div>
        <div class="log-entries" id="logEntries"></div>
      </div>
    </aside>
  </div>

  <!-- Game Over Modal -->
  <div class="modal-overlay" id="gameOverModal" style="display:none">
    <div class="modal">
      <div class="modal-icon" id="modalIcon">💀</div>
      <h2 id="modalTitle">Afgelopen.</h2>
      <div class="modal-scores" id="modalScores"></div>
      <div class="modal-actions">
        <button class="btn-primary" id="rematchBtn">🔫 Herspelen</button>
        <button class="btn-secondary" onclick="window.location='/'">🚪 Lobby</button>
      </div>
      <div id="rematchStatus" class="rematch-status"></div>
    </div>
  </div>

  <div class="special-reveal" id="specialReveal"></div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/game.js"></script>
</body>
</html>
